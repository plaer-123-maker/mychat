<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyChat</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e1117;
    --sidebar-bg: #141820;
    --bubble-out: #2563eb;
    --bubble-in: #1e2433;
    --text: #e8eaf0;
    --text-muted: #7a8299;
    --accent: #3b82f6;
    --border: #1e2535;
    --input-bg: #1a2030;
    --hover: #1a2030;
    --online: #22c55e;
  }

  body {
    font-family: 'Geologica', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* LOGIN SCREEN */
  #loginScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    animation: fadeIn 0.4s ease;
  }

  .login-card {
    background: var(--sidebar-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    width: 360px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .login-logo {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin: 0 auto;
  }

  .login-title {
    font-size: 24px;
    font-weight: 600;
    text-align: center;
    letter-spacing: -0.5px;
  }

  .login-sub {
    font-size: 14px;
    color: var(--text-muted);
    text-align: center;
    margin-top: -12px;
  }

  .login-input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .login-input:focus { border-color: var(--accent); }
  .login-input::placeholder { color: var(--text-muted); }

  .login-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    padding: 13px;
    color: white;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .login-btn:hover { background: #1d4ed8; }
  .login-btn:active { transform: scale(0.98); }

  /* CHAT SCREEN */
  #chatScreen {
    display: none;
    width: 100vw;
    height: 100vh;
    flex-direction: column;
  }

  /* HEADER */
  .chat-header {
    background: var(--sidebar-bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .header-logo {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .header-info .title { font-size: 16px; font-weight: 600; }
  .header-info .subtitle { font-size: 12px; color: var(--online); margin-top: 1px; }

  .header-online {
    margin-left: auto;
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .online-dot {
    width: 8px;
    height: 8px;
    background: var(--online);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* MESSAGES */
  .messages-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .messages-wrap::-webkit-scrollbar { width: 4px; }
  .messages-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .system-msg {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    padding: 6px 12px;
    background: var(--sidebar-bg);
    border-radius: 20px;
    align-self: center;
    margin: 6px 0;
    animation: fadeIn 0.3s ease;
  }

  .message {
    display: flex;
    flex-direction: column;
    max-width: 65%;
    animation: msgIn 0.2s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .message.out { align-self: flex-end; align-items: flex-end; }
  .message.in { align-self: flex-start; align-items: flex-start; }

  .msg-sender {
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 3px;
    padding: 0 4px;
    font-weight: 500;
  }

  .bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }

  .message.out .bubble {
    background: var(--bubble-out);
    border-bottom-right-radius: 4px;
    color: white;
  }

  .message.in .bubble {
    background: var(--bubble-in);
    border-bottom-left-radius: 4px;
  }

  .msg-time {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
    padding: 0 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* TYPING */
  #typingIndicator {
    font-size: 12px;
    color: var(--text-muted);
    padding: 0 20px 8px;
    height: 22px;
    font-style: italic;
    flex-shrink: 0;
  }

  /* INPUT */
  .input-area {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--sidebar-bg);
    display: flex;
    align-items: flex-end;
    gap: 10px;
    flex-shrink: 0;
  }

  .msg-input {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 16px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  .msg-input:focus { border-color: var(--accent); }
  .msg-input::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 20px;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: #1d4ed8; }
  .send-btn:active { transform: scale(0.95); }

  /* USERS LIST */
  .users-bar {
    background: var(--sidebar-bg);
    border-top: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .user-chip {
    font-size: 12px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .user-chip .dot { width: 6px; height: 6px; background: var(--online); border-radius: 50%; }
  .user-chip.me { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">💬</div>
    <div class="login-title">MyChat</div>
    <div class="login-sub">Введи своё имя чтобы войти</div>
    <input class="login-input" id="nameInput" type="text" placeholder="Твоё имя..." maxlength="20" />
    <button class="login-btn" onclick="joinChat()">Войти в чат →</button>
  </div>
</div>

<!-- CHAT -->
<div id="chatScreen">
  <div class="chat-header">
    <div class="header-logo">💬</div>
    <div class="header-info">
      <div class="title">MyChat</div>
      <div class="subtitle">Общий чат</div>
    </div>
    <div class="header-online">
      <div class="online-dot"></div>
      <span id="onlineCount">0 онлайн</span>
    </div>
  </div>

  <div class="messages-wrap" id="messages"></div>

  <div id="typingIndicator"></div>

  <div class="input-area">
    <textarea class="msg-input" id="msgInput" placeholder="Написать сообщение..." rows="1"
      onkeydown="handleKey(event)" oninput="handleTyping(this)"></textarea>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>

  <div class="users-bar" id="usersBar"></div>
</div>

<script>
const socket = io();
let myName = '';
let typingTimeout = null;
let isTyping = false;
const typingUsers = new Set();

// Войти в чат
function joinChat() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  myName = name;
  socket.emit('join', name);
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'flex';
  document.getElementById('msgInput').focus();
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinChat();
});

// Получить историю
socket.on('history', (msgs) => {
  msgs.forEach(addMessage);
  scrollBottom();
});

// Новое сообщение
socket.on('message', (msg) => {
  // Убираем из typing если написал
  typingUsers.delete(msg.username);
  updateTyping();
  addMessage(msg);
  scrollBottom();
});

// Кто-то вошёл
socket.on('user_joined', ({ username, users, count }) => {
  addSystem(`${username} вошёл в чат`);
  updateUsers(users, count);
});

// Кто-то вышел
socket.on('user_left', ({ username, users, count }) => {
  addSystem(`${username} вышел из чата`);
  updateUsers(users, count);
});

// Печатает
socket.on('typing', (username) => {
  typingUsers.add(username);
  updateTyping();
});

socket.on('stop_typing', (username) => {
  typingUsers.delete(username);
  updateTyping();
});

function updateTyping() {
  const el = document.getElementById('typingIndicator');
  if (typingUsers.size === 0) {
    el.textContent = '';
  } else {
    const names = [...typingUsers].join(', ');
    el.textContent = `${names} печатает...`;
  }
}

// Отправить сообщение
function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  socket.emit('message', text);
  socket.emit('stop_typing');
  isTyping = false;
  input.value = '';
  input.style.height = 'auto';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function handleTyping(el) {
  // Авторесайз
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';

  // Typing indicator
  if (!isTyping) {
    isTyping = true;
    socket.emit('typing');
  }
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    isTyping = false;
    socket.emit('stop_typing');
  }, 1500);
}

// Добавить сообщение в чат
function addMessage(msg) {
  const container = document.getElementById('messages');
  const isMe = msg.username === myName;

  const div = document.createElement('div');
  div.className = `message ${isMe ? 'out' : 'in'}`;
  div.innerHTML = `
    ${!isMe ? `<div class="msg-sender">${msg.username}</div>` : ''}
    <div class="bubble">${escapeHtml(msg.text)}</div>
    <div class="msg-time">${msg.time}</div>
  `;
  container.appendChild(div);
}

// Системное сообщение
function addSystem(text) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'system-msg';
  div.textContent = text;
  container.appendChild(div);
  scrollBottom();
}

// Обновить список пользователей
function updateUsers(users, count) {
  document.getElementById('onlineCount').textContent = `${count} онлайн`;
  const bar = document.getElementById('usersBar');
  bar.innerHTML = users.map(u => `
    <div class="user-chip ${u === myName ? 'me' : ''}">
      <div class="dot"></div>
      ${escapeHtml(u)} ${u === myName ? '(ты)' : ''}
    </div>
  `).join('');
}

function scrollBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
