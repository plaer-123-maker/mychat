<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MyChat</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a1a2e">
<script src="/socket.io/socket.io.js"></script>
<style>
/* CSS */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#1a1a2e;color:#fff;height:100vh;overflow:hidden;}
.auth-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a2e;display:flex;justify-content:center;align-items:center;z-index:1000;}
.auth-overlay.hidden{display:none;}
.auth-box{background:#16213e;padding:40px;border-radius:16px;width:360px;text-align:center;}
.auth-box input{width:100%;padding:14px;margin-bottom:12px;border:1px solid #333;border-radius:10px;background:#0f3460;color:#fff;font-size:15px;outline:none;}
.auth-box .btn{width:100%;padding:14px;border:none;border-radius:10px;background:#e94560;color:#fff;font-size:16px;cursor:pointer;margin-top:8px;}
.nick-field{display:none;}.nick-field.show{display:block;}
.app-container{display:none;height:100vh;width:100%;}.app-container.active{display:flex;}
.sidebar{width:300px;background:#16213e;border-right:1px solid #333;display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-header{padding:14px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center;}
.sidebar-tabs{display:flex;border-bottom:1px solid #333;}
.sidebar-tabs button{flex:1;padding:10px;border:none;background:transparent;color:#888;cursor:pointer;}
.sidebar-tabs button.active{color:#fff;border-bottom:2px solid #e94560;}
.search-box{padding:10px;border-bottom:1px solid #333;}
.search-box input{width:100%;padding:10px;border:1px solid #333;border-radius:8px;background:#0f3460;color:#fff;outline:none;}
.sidebar-list{flex:1;overflow-y:auto;}
.chat-item{padding:12px;border-bottom:1px solid #222;cursor:pointer;display:flex;align-items:center;gap:10px;}
.chat-item:hover{background:#0f3460;}
.main-chat{flex:1;display:none;flex-direction:column;}
.main-chat.show{display:flex;}
.chat-header{background:#16213e;padding:14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #333;}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:8px;background:#1a1a2e;}
.message{max-width:70%;padding:10px;border-radius:12px;font-size:14px;word-wrap:break-word;}
.message.mine{align-self:flex-end;background:#e94560;}
.message.other{align-self:flex-start;background:#16213e;}
.message a{color:#fff;text-decoration:underline;}
.input-area{background:#16213e;padding:12px;display:flex;gap:8px;align-items:center;border-top:1px solid #333;}
.input-area input[type="text"]{flex:1;padding:12px;border:1px solid #333;border-radius:10px;background:#0f3460;color:#fff;outline:none;}
.input-area button, .icon-btn{width:42px;height:42px;border:none;border-radius:50%;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.send-btn{background:#e94560;} .icon-btn{background:#0f3460;border:1px solid #333;}
.input-area input[type="file"]{display:none;}
/* Call UI */
.call-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:3000;display:none;flex-direction:column;}
.call-overlay.show{display:flex;}
.call-video-box{flex:1;position:relative;display:flex;justify-content:center;align-items:center;background:#1a1a2e;overflow:hidden;}
#remoteVideo{width:100%;height:100%;object-fit:cover;}
#localVideo{position:absolute;bottom:100px;right:20px;width:100px;height:140px;background:#000;border:2px solid #333;object-fit:cover;z-index:10;border-radius:10px;}
.call-controls{height:100px;background:#16213e;display:flex;justify-content:space-evenly;align-items:center;}
.call-btn{width:60px;height:60px;border-radius:50%;border:none;cursor:pointer;font-size:24px;color:#fff;}
.btn-hangup{background:#ff4757;} .btn-util{background:#333;}
.incoming-call-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#16213e;padding:30px;border-radius:16px;z-index:3001;border:1px solid #e94560;display:none;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.8);}
.incoming-call-modal.show{display:block;}
@media(max-width:600px){.sidebar{width:100%;position:fixed;top:0;left:0;height:100%;z-index:50;}.main-chat.show{position:fixed;top:0;left:0;width:100%;height:100%;z-index:60;}}
</style>
</head>
<body>
<!-- AUTH -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <h2 id="authTitle">Вход</h2>
    <input type="text" id="authLogin" placeholder="Логин">
    <input type="password" id="authPassword" placeholder="Пароль">
    <input type="text" id="authNickname" placeholder="Ник" class="nick-field">
    <button class="btn" id="authBtn">Войти</button>
    <div id="switchLink" style="margin-top:10px;cursor:pointer;color:#e94560;">Нет аккаунта?</div>
    <div id="authError" style="color:red;margin-top:5px;"></div>
  </div>
</div>

<!-- APP -->
<div class="app-container" id="appContainer">
  <div class="sidebar">
    <div class="sidebar-header"><h3>MyChat</h3> <button id="logoutBtn">🚪</button></div>
    <div class="sidebar-tabs">
      <button class="active" id="tabGeneral">Общий</button>
      <button id="tabPrivate">Личные</button>
      <button id="tabRooms">Группы</button>
    </div>
    <div class="search-box"><input id="searchInput" placeholder="Поиск..."></div>
    <div class="sidebar-list" id="sidebarList"></div>
  </div>
  <div class="main-chat" id="mainChat">
    <div class="chat-header">
      <button id="mobileBackBtn" style="display:none;margin-right:10px;">←</button>
      <div id="chatTitle"></div>
      <div id="chatHeaderBtns" style="display:flex;gap:10px;"></div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area" id="inputArea">
      <label class="icon-btn" for="photoInput">📷</label> <input type="file" id="photoInput" accept="image/*">
      <label class="icon-btn" for="fileInput">📎</label> <input type="file" id="fileInput">
      <input type="text" id="msgInput" placeholder="Сообщение...">
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </div>
</div>

<!-- CALLS -->
<div class="call-overlay" id="callOverlay">
  <div class="call-video-box">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
  </div>
  <div class="call-controls">
    <button class="call-btn btn-util" onclick="switchCamera()">🔄</button>
    <button class="call-btn btn-hangup" onclick="endCall()">📞</button>
  </div>
</div>
<div class="incoming-call-modal" id="incomingCallModal">
  <h3>Входящий звонок...</h3>
  <button style="background:#2ecc71;border:none;padding:10px;border-radius:5px;margin-right:10px;color:#fff;" onclick="acceptCall()">Принять</button>
  <button style="background:#ff4757;border:none;padding:10px;border-radius:5px;color:#fff;" onclick="rejectCall()">Сброс</button>
</div>

<script>
var socket = io('https://mychat-production-4ec8.up.railway.app', {transports: ['websocket', 'polling']});

var isLoginMode=true, myNickname='', myRole='user', myLogin='';
var currentView='none', currentPrivateLogin=null, currentRoomId=null;
var localStream, peerConnection, incomingCallData=null, currentFacingMode='user';
var pendingIce=[];

// --- AUTH ---
if(localStorage.getItem('mychat_token')) socket.emit('autoLogin', localStorage.getItem('mychat_token'));

document.getElementById('switchLink').onclick = function(){
  isLoginMode = !isLoginMode;
  document.getElementById('authTitle').textContent = isLoginMode ? 'Вход' : 'Регистрация';
  document.getElementById('authNickname').style.display = isLoginMode ? 'none' : 'block';
};

document.getElementById('authBtn').onclick = function(){
  var l=document.getElementById('authLogin').value, p=document.getElementById('authPassword').value;
  if(isLoginMode) socket.emit('login', {login:l, password:p});
  else socket.emit('register', {login:l, password:p, nickname:document.getElementById('authNickname').value});
};

socket.on('authSuccess', function(d){
  myNickname=d.nickname; myLogin=d.login;
  if(d.token) localStorage.setItem('mychat_token', d.token);
  document.getElementById('authOverlay').classList.add('hidden');
  document.getElementById('appContainer').classList.add('active');
  switchToGeneral();
});
socket.on('authError', function(m){ document.getElementById('authError').textContent=m; localStorage.removeItem('mychat_token'); });

// --- NAVIGATION ---
document.getElementById('tabGeneral').onclick = switchToGeneral;
document.getElementById('tabPrivate').onclick = switchToPrivate;
document.getElementById('tabRooms').onclick = switchToRooms;
document.getElementById('mobileBackBtn').onclick = function(){
  document.getElementById('mainChat').classList.remove('show');
  document.getElementById('noChat').style.display='flex';
};
document.getElementById('logoutBtn').onclick = function(){ localStorage.removeItem('mychat_token'); location.reload(); };

function switchToGeneral(){
  currentView='general';
  document.getElementById('sidebarList').innerHTML='<div class="chat-item" onclick="openGeneral()">💬 Общий чат</div>';
  if(window.innerWidth > 600) openGeneral();
}
function switchToPrivate(){ currentView='private'; socket.emit('getMyChats'); }
function switchToRooms(){ currentView='rooms'; socket.emit('getMyRooms'); }

function openGeneral(){
  currentView='general';
  document.getElementById('mainChat').classList.add('show');
  document.getElementById('chatTitle').textContent='Общий чат';
  document.getElementById('chatHeaderBtns').innerHTML='';
  document.getElementById('messages').innerHTML='';
  if(window.innerWidth<=600) document.getElementById('mobileBackBtn').style.display='block';
  socket.emit('getGeneralHistory');
}
window.openGeneral = openGeneral; // Make global

function openPM(login, nick){
  currentView='pm'; currentPrivateLogin=login;
  document.getElementById('mainChat').classList.add('show');
  document.getElementById('chatTitle').textContent=nick;
  document.getElementById('chatHeaderBtns').innerHTML='<button onclick="startCall(\''+login+'\',\'video\')">📹</button>';
  document.getElementById('messages').innerHTML='';
  if(window.innerWidth<=600) document.getElementById('mobileBackBtn').style.display='block';
  socket.emit('getPrivateHistory', login);
}
window.openPM = openPM;

// --- SOCKET EVENTS ---
socket.on('messageHistory', msgs => { if(currentView==='general') { document.getElementById('messages').innerHTML=''; msgs.forEach(addMsg); } });
socket.on('chatMessage', msg => { if(currentView==='general') addMsg(msg); });
socket.on('privateHistory', d => { if(currentView==='pm' && currentPrivateLogin===d.otherLogin) { document.getElementById('messages').innerHTML=''; d.messages.forEach(addMsg); } });
socket.on('newPrivateMessage', msg => { 
  if(currentView==='pm' && (msg.from_login===currentPrivateLogin || msg.from_login===myLogin)) addMsg(msg); 
  if(currentView==='private') socket.emit('getMyChats');
});

socket.on('myChats', chats => {
  if(currentView!=='private') return;
  var html='';
  chats.forEach(c => html+=`<div class="chat-item" onclick="openPM('${c.login}','${c.nickname}')"><div class="avatar">👤</div><div class="info">${c.nickname}</div></div>`);
  document.getElementById('sidebarList').innerHTML = html || '<div class="empty-list">Нет чатов</div>';
});

function addMsg(msg){
  var div = document.createElement('div');
  div.className = 'message ' + (msg.username===myNickname || msg.from_login===myLogin ? 'mine' : 'other');
  var content = msg.text;
  if(msg.image) content = `<img src="${msg.image}">`;
  else if(msg.file_data) content = `<a href="${msg.file_data}" download="${msg.file_name}" style="color:white">📄 ${msg.file_name}</a>`;
  div.innerHTML = `<div class="name">${msg.username||msg.from_nickname}</div>${content}`;
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

// --- SENDING ---
document.getElementById('sendBtn').onclick = function(){
  var txt = document.getElementById('msgInput').value;
  if(!txt) return;
  if(currentView==='general') socket.emit('chatMessage', {text:txt});
  if(currentView==='pm') socket.emit('privateMessage', {toLogin:currentPrivateLogin, text:txt});
  document.getElementById('msgInput').value='';
};

// --- FILES ---
document.getElementById('fileInput').onchange = function(){
  var file = this.files[0];
  if(!file || file.size > 50*1024*1024) { alert('Файл слишком большой (макс 50МБ)'); return; }
  var reader = new FileReader();
  reader.onload = e => {
    if(currentView==='general') socket.emit('chatMessage', {file_data:e.target.result, file_name:file.name, type:'file'});
    if(currentView==='pm') socket.emit('privateMessage', {toLogin:currentPrivateLogin, file_data:e.target.result, file_name:file.name, type:'file'});
  };
  reader.readAsDataURL(file);
};

// --- CALLS ---
const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

function startCall(user, type){
  document.getElementById('callOverlay').classList.add('show');
  navigator.mediaDevices.getUserMedia({audio:true, video:{facingMode:currentFacingMode}}).then(stream => {
    localStream = stream;
    document.getElementById('localVideo').srcObject = stream;
    peerConnection = new RTCPeerConnection(rtcConfig);
    peerConnection.onicecandidate = e => { if(e.candidate) socket.emit('iceCandidate', {candidate:e.candidate, to:user}); };
    peerConnection.ontrack = e => { document.getElementById('remoteVideo').srcObject = e.streams[0]; };
    localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
    peerConnection.createOffer().then(offer => {
      peerConnection.setLocalDescription(offer);
      socket.emit('callUser', {userToCall:user, signalData:offer, callType:type});
    });
  });
}
window.startCall = startCall;

socket.on('incomingCall', d => {
  incomingCallData = d;
  document.getElementById('incomingCallModal').classList.add('show');
});

function acceptCall(){
  document.getElementById('incomingCallModal').classList.remove('show');
  document.getElementById('callOverlay').classList.add('show');
  navigator.mediaDevices.getUserMedia({audio:true, video:true}).then(stream => {
    localStream = stream;
    document.getElementById('localVideo').srcObject = stream;
    peerConnection = new RTCPeerConnection(rtcConfig);
    peerConnection.onicecandidate = e => { if(e.candidate) socket.emit('iceCandidate', {candidate:e.candidate, to:incomingCallData.from}); };
    peerConnection.ontrack = e => { document.getElementById('remoteVideo').srcObject = e.streams[0]; };
    localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
    peerConnection.setRemoteDescription(new RTCSessionDescription(incomingCallData.signal));
    peerConnection.createAnswer().then(answer => {
      peerConnection.setLocalDescription(answer);
      socket.emit('answerCall', {signal:answer, to:incomingCallData.from});
    });
  });
}
window.acceptCall = acceptCall;

socket.on('callAccepted', sig => peerConnection.setRemoteDescription(new RTCSessionDescription(sig)));
socket.on('iceCandidate', cand => peerConnection.addIceCandidate(new RTCIceCandidate(cand)));
socket.on('callEnded', endCall);

function endCall(){
  if(peerConnection) peerConnection.close();
  if(localStream) localStream.getTracks().forEach(t => t.stop());
  document.getElementById('callOverlay').classList.remove('show');
  document.getElementById('incomingCallModal').classList.remove('show');
}
window.endCall = endCall;
window.rejectCall = function(){
  socket.emit('hangUp', {to:incomingCallData.from});
  document.getElementById('incomingCallModal').classList.remove('show');
}
function switchCamera(){ alert('Функция переключения камеры'); }
window.switchCamera = switchCamera;
</script>
</body>
</html>
