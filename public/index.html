<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyChat</title>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style> 
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e1117;
    --sidebar-bg: #141820;
    --bubble-out: #2563eb;
    --bubble-in: #1e2433;
    --text: #e8eaf0;
    --text-muted: #7a8299;
    --accent: #3b82f6;
    --border: #1e2535;
    --input-bg: #1a2030;
    --online: #22c55e;
  }

  body {
    font-family: 'Geologica', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* LOGIN */
  #loginScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    animation: fadeIn 0.4s ease;
  }

  .login-card {
    background: var(--sidebar-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    width: 360px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .login-logo {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; margin: 0 auto;
  }

  .login-title { font-size: 24px; font-weight: 600; text-align: center; letter-spacing: -0.5px; }
  .login-sub { font-size: 14px; color: var(--text-muted); text-align: center; margin-top: -12px; }

  .login-input {
    width: 100%; background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px; color: var(--text);
    font-family: inherit; font-size: 15px; outline: none; transition: border-color 0.2s;
  }
  .login-input:focus { border-color: var(--accent); }
  .login-input::placeholder { color: var(--text-muted); }

  .login-btn {
    width: 100%; background: var(--accent); border: none; border-radius: 12px;
    padding: 13px; color: white; font-family: inherit; font-size: 15px;
    font-weight: 500; cursor: pointer; transition: background 0.15s;
  }
  .login-btn:hover { background: #1d4ed8; }

  /* CHAT */
  #chatScreen { display: none; width: 100vw; height: 100vh; flex-direction: column; }

  .chat-header {
    background: var(--sidebar-bg); border-bottom: 1px solid var(--border);
    padding: 14px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }

  .header-logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }

  .header-info .title { font-size: 16px; font-weight: 600; }
  .header-info .subtitle { font-size: 12px; color: var(--online); margin-top: 1px; }

  .header-online {
    margin-left: auto; font-size: 13px; color: var(--text-muted);
    display: flex; align-items: center; gap: 6px;
  }

  .online-dot {
    width: 8px; height: 8px; background: var(--online);
    border-radius: 50%; animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  /* MESSAGES */
  .messages-wrap {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .messages-wrap::-webkit-scrollbar { width: 4px; }
  .messages-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .system-msg {
    text-align: center; font-size: 12px; color: var(--text-muted);
    padding: 6px 12px; background: var(--sidebar-bg); border-radius: 20px;
    align-self: center; margin: 6px 0; animation: fadeIn 0.3s ease;
  }

  .message { display: flex; flex-direction: column; max-width: 65%; animation: msgIn 0.2s ease; }
  .message.out { align-self: flex-end; align-items: flex-end; }
  .message.in { align-self: flex-start; align-items: flex-start; }

  .msg-sender { font-size: 11px; color: var(--accent); margin-bottom: 3px; padding: 0 4px; font-weight: 500; }

  .bubble {
    padding: 10px 14px; border-radius: 16px; font-size: 14px;
    line-height: 1.5; word-break: break-word;
  }
  .message.out .bubble { background: var(--bubble-out); border-bottom-right-radius: 4px; color: white; }
  .message.in .bubble { background: var(--bubble-in); border-bottom-left-radius: 4px; }

  /* Фото в сообщении */
  .bubble.image-bubble { padding: 4px; background: transparent !important; }
  .bubble.image-bubble img {
    max-width: 280px; max-height: 280px; border-radius: 12px;
    display: block; cursor: pointer; transition: opacity 0.15s;
  }
  .bubble.image-bubble img:hover { opacity: 0.9; }
  .message.out .bubble.image-bubble img { border-bottom-right-radius: 4px; }
  .message.in .bubble.image-bubble img { border-bottom-left-radius: 4px; }

  .msg-time {
    font-size: 11px; color: var(--text-muted); margin-top: 3px;
    padding: 0 4px; font-family: 'JetBrains Mono', monospace;
  }

  #typingIndicator { font-size: 12px; color: var(--text-muted); padding: 0 20px 8px; height: 22px; font-style: italic; flex-shrink: 0; }

  /* INPUT */
  .input-area {
    padding: 12px 16px; border-top: 1px solid var(--border);
    background: var(--sidebar-bg); display: flex; align-items: flex-end; gap: 10px; flex-shrink: 0;
  }

  .msg-input {
    flex: 1; background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 14px; padding: 10px 16px; color: var(--text);
    font-family: inherit; font-size: 14px; outline: none;
    resize: none; max-height: 120px; line-height: 1.5; transition: border-color 0.2s;
  }
  .msg-input:focus { border-color: var(--accent); }
  .msg-input::placeholder { color: var(--text-muted); }

  .icon-btn {
    width: 44px; height: 44px; border-radius: 50%; background: var(--input-bg);
    border: 1px solid var(--border); cursor: pointer; display: flex;
    align-items: center; justify-content: center; color: var(--text-muted);
    font-size: 20px; transition: background 0.15s, color 0.15s; flex-shrink: 0;
  }
  .icon-btn:hover { background: var(--hover); color: var(--text); }

  .send-btn {
    width: 44px; height: 44px; border-radius: 50%; background: var(--accent);
    border: none; cursor: pointer; display: flex; align-items: center;
    justify-content: center; color: white; font-size: 20px;
    transition: background 0.15s, transform 0.1s; flex-shrink: 0;
  }
  .send-btn:hover { background: #1d4ed8; }
  .send-btn:active { transform: scale(0.95); }

  /* Превью фото перед отправкой */
  .image-preview {
    display: none; padding: 8px 16px;
    background: var(--sidebar-bg); border-top: 1px solid var(--border);
    flex-shrink: 0; position: relative;
  }
  .image-preview img { height: 80px; border-radius: 8px; }
  .image-preview .remove-preview {
    position: absolute; top: 4px; left: 72px;
    background: #ef4444; color: white; border: none;
    border-radius: 50%; width: 20px; height: 20px;
    cursor: pointer; font-size: 12px; display: flex;
    align-items: center; justify-content: center;
  }

  /* Лайтбокс для просмотра фото */
  .lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.9); z-index: 1000;
    align-items: center; justify-content: center; cursor: zoom-out;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

  .users-bar {
    background: var(--sidebar-bg); border-top: 1px solid var(--border);
    padding: 8px 16px; display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0;
  }
  .user-chip {
    font-size: 12px; background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 10px; color: var(--text-muted);
    display: flex; align-items: center; gap: 5px;
  }
  .user-chip .dot { width: 6px; height: 6px; background: var(--online); border-radius: 50%; }
  .user-chip.me { border-color: var(--accent); color: var(--accent); }

  #fileInput { display: none; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">💬</div>
    <div class="login-title">MyChat</div>
    <div class="login-sub">Введи логин и пароль, чтобы войти</div>
    <input class="login-input" id="usernameInput" type="text" placeholder="Логин" maxlength="20" required />
    <input class="login-input" id="passwordInput" type="password" placeholder="Пароль" required />
    <button class="login-btn" onclick="registerOrLogin()">Войти в чат →</button>
    <div class="login-sub">Ещё нет аккаунта? <span onclick="showRegisterForm()" style="color: var(--accent); cursor: pointer;">Зарегистрироваться</span></div>
  </div>
</div>

<!-- Регистрация (сейчас скрыта) -->
<div id="registerScreen" style="display:none;">
  <div class="login-card">
    <div class="login-logo">💬</div>
    <div class="login-title">Регистрация</div>
    <input class="login-input" id="newUsernameInput" type="text" placeholder="Новый логин" maxlength="20" required />
    <input class="login-input" id="newPasswordInput" type="password" placeholder="Новый пароль" required />
    <button class="login-btn" onclick="register()">Зарегистрироваться</button>
    <div class="login-sub">Уже есть аккаунт? <span onclick="showLoginForm()" style="color: var(--accent); cursor: pointer;">Войти</span></div>
  </div>
</div>

<!-- CHAT -->
<div id="chatScreen">
  <div class="chat-header">
    <div class="header-logo">💬</div>
    <div class="header-info">
      <div class="title">MyChat</div>
      <div class="subtitle">Общий чат</div>
    </div>
    <div class="header-online">
      <div class="online-dot"></div>
      <span id="onlineCount">0 онлайн</span>
    </div>
  </div>

  <div class="messages-wrap" id="messages"></div>
  <div id="typingIndicator"></div>

  <!-- Превью выбранного фото -->
  <div class="image-preview" id="imagePreview">
    <img id="previewImg" src="" />
    <button class="remove-preview" onclick="removePreview()">✕</button>
  </div>

  <div class="input-area">
    <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="Отправить фото">🖼️</button>
    <input type="file" id="fileInput" accept="image/*" onchange="handleImageSelect(event)" />
    <textarea class="msg-input" id="msgInput" placeholder="Написать сообщение..." rows="1"
      onkeydown="handleKey(event)" oninput="handleTyping(this)"></textarea>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>

  <div class="users-bar" id="usersBar"></div>
</div>

<!-- Лайтбокс -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" />
</div>

<script>
// Логика регистрации и входа
let users = {}; // Для хранения пользователей

function register() {
  const newUsername = document.getElementById('newUsernameInput').value.trim();
  const newPassword = document.getElementById('newPasswordInput').value.trim();

  if (!newUsername || !newPassword) return;

  // Проверка на существование пользователя
  if (users[newUsername]) {
    alert('Пользователь с таким логином уже существует');
    return;
  }

  // Сохраняем пользователя
  users[newUsername] = newPassword;
  alert('Регистрация успешна!');
  showLoginForm();
}

function registerOrLogin() {
  const username = document.getElementById('usernameInput').value.trim();
  const password = document.getElementById('passwordInput').value.trim();

  if (!username || !password) return;

  // Проверка на существование пользователя
  if (users[username] === password) {
    alert('Добро пожаловать в чат!');
    joinChat(username);
  } else {
    alert('Неверный логин или пароль');
  }
}

function showRegisterForm() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('registerScreen').style.display = 'flex';
}

function showLoginForm() {
  document.getElementById('registerScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

function joinChat(username) {
  myName = username;
  socket.emit('join', username);
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'flex';
  document.getElementById('msgInput').focus();
}
</script>
</body>
</html>
