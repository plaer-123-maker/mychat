<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyChat</title>
<script src="/socket.io/socket.io.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial,sans-serif; background:#1a1a2e; color:#fff; height:100vh; display:flex; justify-content:center; align-items:center; }

/* AUTH */
.auth-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#1a1a2e; display:flex; justify-content:center; align-items:center; z-index:1000; }
.auth-overlay.hidden { display:none; }
.auth-box { background:#16213e; padding:40px; border-radius:16px; width:360px; text-align:center; }
.auth-box h2 { margin-bottom:8px; font-size:24px; }
.auth-box p { color:#888; margin-bottom:24px; font-size:14px; }
.auth-box input { width:100%; padding:14px; margin-bottom:12px; border:1px solid #333; border-radius:10px; background:#0f3460; color:#fff; font-size:15px; outline:none; }
.auth-box input:focus { border-color:#e94560; }
.auth-box .btn { width:100%; padding:14px; border:none; border-radius:10px; background:#e94560; color:#fff; font-size:16px; cursor:pointer; margin-top:8px; }
.auth-box .btn:hover { background:#c73652; }
.auth-box .btn:active { transform:scale(0.98); }
.auth-box .switch { margin-top:16px; color:#888; font-size:14px; }
.auth-box .switch a { color:#e94560; cursor:pointer; text-decoration:none; }
.auth-box .error { color:#ff6b6b; font-size:13px; margin-bottom:8px; min-height:20px; }
.nick-field { display:none; }
.nick-field.show { display:block; }

/* CHAT */
.chat-container { display:none; flex-direction:column; width:100%; height:100vh; max-width:800px; margin:0 auto; }
.chat-container.active { display:flex; }
.chat-header { background:#16213e; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333; }
.chat-header h3 { font-size:18px; }
.header-btns { display:flex; gap:10px; }
.header-btns button { background:#0f3460; border:1px solid #333; color:#fff; padding:8px 14px; border-radius:8px; cursor:pointer; font-size:13px; }
.header-btns button:hover { background:#e94560; }
.messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:8px; }
.message { max-width:70%; padding:10px 14px; border-radius:12px; font-size:14px; word-wrap:break-word; }
.message.mine { align-self:flex-end; background:#e94560; }
.message.other { align-self:flex-start; background:#16213e; }
.message .name { font-size:11px; color:#aaa; margin-bottom:4px; }
.message .text { line-height:1.4; }
.message img { max-width:250px; border-radius:8px; cursor:pointer; }
.message audio { max-width:250px; }
.message .del-btn { font-size:11px; color:#ff6b6b; cursor:pointer; margin-top:4px; display:block; text-align:right; }
.input-area { background:#16213e; padding:12px 16px; display:flex; gap:10px; align-items:center; border-top:1px solid #333; }
.input-area input[type="text"] { flex:1; padding:12px; border:1px solid #333; border-radius:10px; background:#0f3460; color:#fff; font-size:14px; outline:none; }
.input-area button { width:42px; height:42px; border:none; border-radius:50%; background:#e94560; color:#fff; font-size:18px; cursor:pointer; }
.input-area label { width:42px; height:42px; border:none; border-radius:50%; background:#0f3460; color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; border:1px solid #333; }
.input-area input[type="file"] { display:none; }
.online-count { font-size:12px; color:#888; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <h2 id="authTitle">Вход в MyChat</h2>
    <p id="authSubtitle">Введи логин и пароль</p>
    <div class="error" id="authError"></div>
    <input type="text" id="authLogin" placeholder="Логин">
    <input type="password" id="authPassword" placeholder="Пароль">
    <input type="text" id="authNickname" placeholder="Ник (будет виден в чате)" class="nick-field" id="nickField">
    <button class="btn" id="authBtn" type="button">Войти →</button>
    <div class="switch">
      <span id="switchText">Нет аккаунта?</span>
      <a id="switchLink">Зарегистрироваться</a>
    </div>
  </div>
</div>

<!-- CHAT SCREEN -->
<div class="chat-container" id="chatContainer">
  <div class="chat-header">
    <div>
      <h3>MyChat</h3>
      <span class="online-count" id="onlineCount">0 онлайн</span>
    </div>
    <div class="header-btns">
      <button id="nickBtn">✏️ Ник</button>
      <button id="logoutBtn">Выйти</button>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <label for="photoInput">📷</label>
    <input type="file" id="photoInput" accept="image/*">
    <input type="text" id="msgInput" placeholder="Сообщение...">
    <button id="sendBtn">➤</button>
  </div>
</div>

<script>
const socket = io();
let isLoginMode = true;
let myNickname = '';

// AUTH ELEMENTS
const authOverlay = document.getElementById('authOverlay');
const authTitle = document.getElementById('authTitle');
const authSubtitle = document.getElementById('authSubtitle');
const authError = document.getElementById('authError');
const authLogin = document.getElementById('authLogin');
const authPassword = document.getElementById('authPassword');
const authNickname = document.getElementById('authNickname');
const authBtn = document.getElementById('authBtn');
const switchText = document.getElementById('switchText');
const switchLink = document.getElementById('switchLink');

// CHAT ELEMENTS
const chatContainer = document.getElementById('chatContainer');
const messagesDiv = document.getElementById('messages');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const photoInput = document.getElementById('photoInput');
const onlineCount = document.getElementById('onlineCount');
const nickBtn = document.getElementById('nickBtn');
const logoutBtn = document.getElementById('logoutBtn');

// SWITCH LOGIN/REGISTER
switchLink.addEventListener('click', function() {
  isLoginMode = !isLoginMode;
  if (isLoginMode) {
    authTitle.textContent = 'Вход в MyChat';
    authSubtitle.textContent = 'Введи логин и пароль';
    authBtn.textContent = 'Войти →';
    switchText.textContent = 'Нет аккаунта?';
    switchLink.textContent = 'Зарегистрироваться';
    authNickname.classList.remove('show');
  } else {
    authTitle.textContent = 'Регистрация';
    authSubtitle.textContent = 'Создай свой аккаунт';
    authBtn.textContent = 'Создать аккаунт →';
    switchText.textContent = 'Уже есть аккаунт?';
    switchLink.textContent = 'Войти';
    authNickname.classList.add('show');
  }
  authError.textContent = '';
});

// AUTH BUTTON
authBtn.addEventListener('click', function() {
  var login = authLogin.value.trim();
  var password = authPassword.value.trim();
  if (isLoginMode) {
    if (!login || !password) { authError.textContent = 'Заполни все поля'; return; }
    socket.emit('login', { login: login, password: password });
  } else {
    var nickname = authNickname.value.trim();
    if (!login || !password || !nickname) { authError.textContent = 'Заполни все поля'; return; }
    socket.emit('register', { login: login, password: password, nickname: nickname });
  }
});

// AUTH RESPONSE
socket.on('authSuccess', function(data) {
  myNickname = data.nickname;
  authOverlay.classList.add('hidden');
  chatContainer.classList.add('active');
});

socket.on('authError', function(msg) {
  authError.textContent = msg;
});

// MESSAGES
socket.on('messageHistory', function(msgs) {
  messagesDiv.innerHTML = '';
  msgs.forEach(function(m) { addMessage(m); });
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
});

socket.on('chatMessage', function(msg) {
  addMessage(msg);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
});

socket.on('messageDeleted', function(id) {
  var el = document.getElementById('msg-' + id);
  if (el) el.remove();
});

socket.on('onlineUsers', function(users) {
  onlineCount.textContent = users.length + ' онлайн';
});

function addMessage(msg) {
  var div = document.createElement('div');
  div.className = 'message ' + (msg.username === myNickname ? 'mine' : 'other');
  div.id = 'msg-' + msg.id;
  var html = '<div class="name">' + msg.username + '</div>';
  if (msg.type === 'image' && msg.image) {
    html += '<img src="' + msg.image + '" onclick="window.open(this.src)">';
  } else if (msg.type === 'voice' && msg.voice) {
    html += '<audio controls src="' + msg.voice + '"></audio>';
  } else {
    html += '<div class="text">' + msg.text + '</div>';
  }
  if (msg.username === myNickname) {
    html += '<span class="del-btn" onclick="deleteMsg(' + msg.id + ')">Удалить</span>';
  }
  div.innerHTML = html;
  messagesDiv.appendChild(div);
}

function deleteMsg(id) {
  socket.emit('deleteMessage', id);
}

// SEND TEXT
sendBtn.addEventListener('click', function() {
  var text = msgInput.value.trim();
  if (!text) return;
  socket.emit('chatMessage', { text: text, type: 'text' });
  msgInput.value = '';
});

msgInput.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') sendBtn.click();
});

// SEND PHOTO
photoInput.addEventListener('change', function() {
  var file = this.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    socket.emit('chatMessage', { image: e.target.result, type: 'image' });
  };
  reader.readAsDataURL(file);
  this.value = '';
});

// CHANGE NICKNAME
nickBtn.addEventListener('click', function() {
  var newNick = prompt('Новый ник:', myNickname);
  if (newNick && newNick.trim()) {
    myNickname = newNick.trim();
    socket.emit('changeNickname', myNickname);
  }
});

// LOGOUT
logoutBtn.addEventListener('click', function() {
  location.reload();
});
</script>
</body>
</html>
