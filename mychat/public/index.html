<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MyChat</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#0e1621;color:#fff;height:100vh;overflow:hidden;}
/* AUTH */
.auth-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#0e1621;display:flex;justify-content:center;align-items:center;z-index:2000;}
.auth-overlay.hidden{display:none;}
.auth-box{background:#17212b;padding:30px;border-radius:12px;width:320px;text-align:center;box-shadow:0 10px 20px rgba(0,0,0,0.5);}
.auth-box input{width:100%;padding:12px;margin-bottom:10px;border:1px solid #2b5278;border-radius:8px;background:#242f3d;color:#fff;outline:none;}
.auth-box button{width:100%;padding:12px;border:none;border-radius:8px;background:#5288c1;color:#fff;cursor:pointer;font-weight:bold;}
.auth-box .link{color:#5288c1;cursor:pointer;margin-top:10px;display:block;font-size:13px;}
/* MAIN APP */
.app-container{display:none;height:100%;width:100%;}
.app-container.active{display:flex;}
.sidebar{width:320px;background:#17212b;border-right:1px solid #0e1621;display:flex;flex-direction:column;flex-shrink:0;}
.main-chat{flex:1;background:#0e1621;display:flex;flex-direction:column;position:relative;background-image:url('https://web.telegram.org/img/bg_0.png');background-size:cover;}
/* HEADER */
.header{height:56px;background:#17212b;padding:0 15px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #0e1621;flex-shrink:0;}
.header-title{font-weight:bold;font-size:18px;}
.header-avatar{width:36px;height:36px;border-radius:50%;background:#5288c1;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;overflow:hidden;}
.header-avatar img{width:100%;height:100%;object-fit:cover;}
/* TABS & SEARCH */
.tabs{display:flex;background:#17212b;}
.tab{flex:1;padding:12px;text-align:center;color:#828a95;cursor:pointer;font-size:14px;border-bottom:2px solid transparent;}
.tab.active{color:#5288c1;border-bottom:2px solid #5288c1;}
.search-bar{padding:8px;background:#17212b;}
.search-bar input{width:100%;padding:8px 12px;border-radius:18px;border:none;background:#242f3d;color:#fff;outline:none;font-size:14px;}
/* CHAT LIST */
.chat-list{flex:1;overflow-y:auto;}
.chat-item{padding:10px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.chat-item:hover{background:#202b36;}
.chat-item.active{background:#2b5278;}
.chat-item .avatar{width:48px;height:48px;border-radius:50%;background:#e17076;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:20px;overflow:hidden;}
.chat-item .avatar img{width:100%;height:100%;object-fit:cover;}
.chat-item .content{flex:1;overflow:hidden;}
.chat-item .name{font-weight:bold;font-size:15px;margin-bottom:4px;}
.chat-item .preview{font-size:13px;color:#828a95;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-item .meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.chat-item .badge{background:#5288c1;color:#fff;font-size:12px;padding:2px 8px;border-radius:12px;min-width:20px;text-align:center;}
/* MESSAGES */
.messages{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:6px;}
.msg{max-width:75%;padding:8px 12px;border-radius:12px;position:relative;font-size:15px;word-wrap:break-word;background:#182533;align-self:flex-start;border-bottom-left-radius:2px;}
.msg.mine{background:#2b5278;align-self:flex-end;border-bottom-left-radius:12px;border-bottom-right-radius:2px;}
.msg .sender{font-size:13px;color:#e17076;font-weight:bold;margin-bottom:4px;cursor:pointer;}
.msg.mine .sender{display:none;}
.msg img{max-width:100%;border-radius:8px;margin-top:4px;cursor:pointer;}
.msg video{max-width:100%;border-radius:8px;margin-top:4px;}
.msg .video-circle{width:180px;height:180px;border-radius:50%;object-fit:cover;border:2px solid #5288c1;}
.msg .time{font-size:11px;color:#828a95;text-align:right;margin-top:4px;}
.reply-preview{border-left:2px solid #5288c1;padding-left:8px;margin-bottom:4px;font-size:13px;color:#828a95;}
/* INPUT */
.input-area{background:#17212b;padding:8px 15px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.reply-bar{background:#17212b;padding:8px 15px;border-bottom:1px solid #0e1621;display:none;align-items:center;justify-content:space-between;font-size:13px;color:#5288c1;}
.reply-bar.show{display:flex;}
.attach-btn{font-size:24px;color:#828a95;cursor:pointer;}
.input-field{flex:1;background:#17212b;border:none;color:#fff;font-size:16px;outline:none;padding:10px;max-height:100px;overflow-y:auto;}
.send-btn{color:#5288c1;font-size:24px;cursor:pointer;}
.mic-btn{color:#828a95;font-size:24px;cursor:pointer;}
.mic-btn.recording{color:#e17076;animation:pulse 1s infinite;}
.video-btn{color:#828a95;font-size:24px;cursor:pointer;}
.video-btn.recording{color:#e17076;animation:pulse 1s infinite;}
/* MODALS */
.modal-wrap{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:3000;display:none;justify-content:center;align-items:center;}
.modal-wrap.show{display:flex;}
.modal{background:#17212b;padding:20px;border-radius:12px;width:300px;text-align:center;}
.modal h3{margin-bottom:15px;}
.modal input, .modal select{width:100%;padding:10px;margin-bottom:10px;background:#242f3d;border:1px solid #2b5278;color:#fff;border-radius:8px;}
.modal-actions{display:flex;gap:10px;}
.modal-actions button{flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer;}
.btn-save{background:#5288c1;color:#fff;}
.btn-cancel{background:#2b2b2b;color:#ccc;}
/* MOBILE */
@media(max-width:768px){
 .sidebar{width:100%;display:flex;}
 .main-chat{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;}
 .main-chat.show{display:flex;}
}
@keyframes pulse{0%{opacity:1;}50%{opacity:0.5;}100%{opacity:1;}}
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-overlay" id="authScreen">
  <div class="auth-box">
    <h2 id="authTitle">Вход</h2>
    <input id="authLogin" placeholder="Логин">
    <input id="authPass" type="password" placeholder="Пароль">
    <input id="authNick" placeholder="Ник" style="display:none">
    <button id="authBtn">Войти</button>
    <div class="link" id="authSwitch">Нет аккаунта?</div>
    <div id="authError" style="color:#e17076;margin-top:10px;font-size:13px;"></div>
  </div>
</div>

<!-- APP -->
<div class="app-container" id="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="header">
      <div class="header-avatar" id="myAvatar" onclick="openProfile()"><img src="" onerror="this.style.display='none'">👤</div>
      <div class="header-title">MyChat</div>
      <div style="font-size:24px;cursor:pointer;" onclick="openCreateMenu()">+</div>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('pm')">Личные</div>
      <div class="tab" onclick="switchTab('group')">Группы</div>
      <div class="tab" onclick="switchTab('channel')">Каналы</div>
    </div>
    <div class="search-bar"><input id="search" placeholder="Поиск..." oninput="doSearch()"></div>
    <div class="chat-list" id="chatList"></div>
  </div>

  <!-- CHAT -->
  <div class="main-chat" id="chatView">
    <div class="header">
      <div style="font-size:20px;cursor:pointer;margin-right:15px;display:none" id="backBtn" onclick="closeChat()">←</div>
      <div class="header-avatar" id="chatAvatar"><img src="" onerror="this.style.display='none'">#</div>
      <div style="margin-left:10px;">
        <div class="header-title" id="chatTitle">Чат</div>
        <div style="font-size:12px;color:#828a95;" id="chatSub"></div>
      </div>
    </div>
    <div class="messages" id="msgs"></div>
    <div class="reply-bar" id="replyBar">
      <span>Ответ на сообщение...</span>
      <span style="cursor:pointer" onclick="cancelReply()">✕</span>
    </div>
    <div class="input-area" id="inputArea">
      <label class="attach-btn">📎<input type="file" id="fileInput" hidden></label>
      <input class="input-field" id="msgInput" placeholder="Сообщение...">
      <div class="mic-btn" id="micBtn">🎤</div>
      <div class="video-btn" id="vidBtn">⭕</div>
      <div class="send-btn" id="sendBtn">➤</div>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-wrap" id="createModal">
  <div class="modal">
    <h3>Создать</h3>
    <input id="createName" placeholder="Название">
    <select id="createType">
      <option value="group">Группа</option>
      <option value="channel">Канал</option>
    </select>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModals()">Отмена</button>
      <button class="btn-save" onclick="createRoom()">Создать</button>
    </div>
  </div>
</div>

<div class="modal-wrap" id="profileModal">
  <div class="modal">
    <h3>Профиль</h3>
    <div style="margin-bottom:15px;display:flex;justify-content:center;">
      <label style="width:80px;height:80px;border-radius:50%;background:#5288c1;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;">
        <img id="profileImg" src="" style="width:100%;height:100%;object-fit:cover;display:none">
        <span id="profileIcon" style="font-size:30px">📷</span>
        <input type="file" id="avatarInput" hidden onchange="uploadAvatar()">
      </label>
    </div>
    <h4 id="profileNick"></h4>
    <div style="margin-top:10px;font-size:13px;color:#828a95;" id="profileLogin"></div>
    <button style="margin-top:20px;background:#e17076;padding:10px;border:none;border-radius:8px;color:#fff;width:100%;cursor:pointer;" onclick="location.reload()">Выйти</button>
    <button style="margin-top:10px;background:#2b2b2b;padding:10px;border:none;border-radius:8px;color:#fff;width:100%;cursor:pointer;" onclick="closeModals()">Закрыть</button>
  </div>
</div>

<script>
const socket = io();
let myUser = null;
let currentTab = 'pm';
let currentChat = null; // {type: 'pm'|'room', id: login|id}
let replyTo = null;
let mediaRecorder = null;
let chunks = [];

// AUTH
let isReg = false;
document.getElementById('authSwitch').onclick = () => {
  isReg = !isReg;
  document.getElementById('authTitle').innerText = isReg ? 'Регистрация' : 'Вход';
  document.getElementById('authBtn').innerText = isReg ? 'Создать' : 'Войти';
  document.getElementById('authNick').style.display = isReg ? 'block' : 'none';
};
document.getElementById('authBtn').onclick = () => {
  const l = document.getElementById('authLogin').value;
  const p = document.getElementById('authPass').value;
  const n = document.getElementById('authNick').value;
  if(!l || !p) return;
  if(isReg) socket.emit('register', {login:l, password:p, nickname:n});
  else socket.emit('login', {login:l, password:p});
};
socket.on('authSuccess', (u) => {
  myUser = u;
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('app').classList.add('active');
  updateProfileUI();
  loadChats();
});
socket.on('authError', (e) => document.getElementById('authError').innerText = e);

// TABS & LISTS
function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  loadChats();
}
function loadChats() {
  if(currentTab === 'pm') socket.emit('getMyChats');
  else socket.emit('getMyRooms'); // For groups/channels
}
socket.on('myChats', (list) => renderList(list, 'pm'));
socket.on('myRoomsList', (list) => {
  // Filter by tab
  const filtered = list.filter(r => r.type === currentTab);
  renderList(filtered, 'room');
});

function renderList(list, type) {
  const cont = document.getElementById('chatList');
  cont.innerHTML = '';
  list.forEach(item => {
    const el = document.createElement('div');
    el.className = 'chat-item';
    const name = type === 'pm' ? item.nickname : item.name;
    const avatar = item.avatar || '';
    const last = item.lastMsg ? (item.lastMsg.text || 'Медиа') : 'Нет сообщений';
    const id = type === 'pm' ? item.login : item.id;
    
    el.innerHTML = `
      <div class="avatar" style="background:${stringToColor(name)}">
        ${avatar ? `<img src="${avatar}">` : name[0].toUpperCase()}
      </div>
      <div class="content">
        <div class="name">${name}</div>
        <div class="preview">${last}</div>
      </div>
    `;
    el.onclick = () => openChat(type, id, name, avatar);
    cont.appendChild(el);
  });
}

// CHAT LOGIC
function openChat(type, id, name, avatar) {
  currentChat = {type, id};
  document.getElementById('chatTitle').innerText = name;
  document.getElementById('chatSub').innerText = type === 'pm' ? 'Личный чат' : (type === 'group' ? 'Группа' : 'Канал');
  const avEl = document.getElementById('chatAvatar');
  if(avatar) { avEl.innerHTML=`<img src="${avatar}">`; } 
  else { avEl.innerHTML=name[0].toUpperCase(); avEl.style.background=stringToColor(name); }
  
  // Mobile UI
  if(window.innerWidth <= 768) {
    document.getElementById('chatView').classList.add('show');
    document.getElementById('backBtn').style.display='block';
  }

  document.getElementById('msgs').innerHTML = '';
  if(type === 'pm') socket.emit('getPrivateHistory', id);
  else socket.emit('joinRoom', id);
}

function closeChat() {
  document.getElementById('chatView').classList.remove('show');
  currentChat = null;
}

// MESSAGES
socket.on('chatMessage', (m) => addMsg(m)); // Global - ignore
socket.on('newPrivateMessage', (m) => {
  if(currentChat && currentChat.type === 'pm' && (currentChat.id === m.from_login || currentChat.id === m.to_login)) addMsg(m);
  else loadChats();
});
socket.on('roomMessage', (m) => {
  if(currentChat && currentChat.type === 'room' && currentChat.id === m.room_id) addMsg(m);
  // else update preview if in list
});
socket.on('roomHistory', (d) => { if(currentChat && currentChat.id === d.roomId) d.messages.forEach(addMsg); });
socket.on('privateHistory', (d) => { if(currentChat && currentChat.id === d.otherLogin) d.messages.forEach(addMsg); });

function addMsg(m) {
  const el = document.createElement('div');
  const isMine = (m.user_login || m.from_login) === myUser.login;
  el.className = `msg ${isMine ? 'mine' : 'other'}`;
  
  let content = '';
  if(m.reply_to) content += `<div class="reply-preview">Ответ на сообщение</div>`;
  if(m.text) content += `<div>${m.text}</div>`;
  if(m.image) content += `<img src="${m.image}" onclick="window.open(this.src)">`;
  if(m.video) content += `<video src="${m.video}" controls ${m.type==='video_note'?'class="video-circle" autoplay muted':''}></video>`;
  if(m.voice) content += `<audio src="${m.voice}" controls></audio>`;
  
  const senderName = m.username || m.from_nickname;
  
  el.innerHTML = `
    <div class="sender">${senderName}</div>
    ${content}
    <div class="time">${new Date(Number(m.timestamp)).toLocaleTimeString().slice(0,5)}</div>
  `;
  
  // Reply Logic
  el.ondblclick = () => {
    replyTo = m.id;
    document.getElementById('replyBar').classList.add('show');
  };

  document.getElementById('msgs').appendChild(el);
  document.getElementById('msgs').scrollTop = 100000;
}

// SENDING
document.getElementById('sendBtn').onclick = sendMessage;
function sendMessage() {
  const txt = document.getElementById('msgInput').value;
  if(!txt && !fileData) return;
  const data = { 
    text: txt, 
    replyTo: replyTo,
    ...(fileData || {}) 
  };
  
  if(currentChat.type === 'pm') {
    socket.emit('privateMessage', { toLogin: currentChat.id, ...data });
  } else {
    socket.emit('roomMessage', { roomId: currentChat.id, ...data });
  }
  
  resetInput();
}

// FILE HANDLING
let fileData = null;
document.getElementById('fileInput').onchange = (e) => {
  const f = e.target.files[0];
  if(!f) return;
  if(f.size > 10*1024*1024) return alert('Файл > 10MB');
  const reader = new FileReader();
  reader.onload = (ev) => {
    const type = f.type.startsWith('image') ? 'image' : (f.type.startsWith('video') ? 'video' : 'file');
    fileData = { [type]: ev.target.result, type };
    sendMessage(); // Send immediately for now
  };
  reader.readAsDataURL(f);
};

// VIDEO NOTE (CIRCLES)
document.getElementById('vidBtn').onclick = () => {
  if(mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    document.getElementById('vidBtn').classList.remove('recording');
  } else {
    navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(stream => {
      mediaRecorder = new MediaRecorder(stream);
      chunks = [];
      mediaRecorder.ondataavailable = e => chunks.push(e.data);
      mediaRecorder.onstop = () => {
        const blob = new Blob(chunks, {type:'video/webm'});
        const reader = new FileReader();
        reader.onload = e => {
          fileData = { video: e.target.result, type: 'video_note' };
          sendMessage();
        };
        reader.readAsDataURL(blob);
        stream.getTracks().forEach(t=>t.stop());
      };
      mediaRecorder.start();
      document.getElementById('vidBtn').classList.add('recording');
    });
  }
};

// CREATION & PROFILE
function openCreateMenu() { document.getElementById('createModal').classList.add('show'); }
function closeModals() { document.querySelectorAll('.modal-wrap').forEach(e=>e.classList.remove('show')); }
function createRoom() {
  const name = document.getElementById('createName').value;
  const type = document.getElementById('createType').value;
  if(!name) return;
  socket.emit('createRoom', { name, type, avatar: null });
  closeModals();
}
function openProfile() { document.getElementById('profileModal').classList.add('show'); }
function updateProfileUI() {
  document.getElementById('profileNick').innerText = myUser.nickname;
  document.getElementById('profileLogin').innerText = '@' + myUser.login;
  const img = document.getElementById('profileImg');
  const icn = document.getElementById('profileIcon');
  const headAv = document.getElementById('myAvatar').querySelector('img');
  
  if(myUser.avatar) {
    img.src = myUser.avatar; img.style.display='block'; icn.style.display='none';
    headAv.src = myUser.avatar; headAv.style.display='block';
  } else {
    img.style.display='none'; icn.style.display='block';
    headAv.style.display='none';
  }
}
function uploadAvatar() {
  const f = document.getElementById('avatarInput').files[0];
  if(!f) return;
  const r = new FileReader();
  r.onload = e => socket.emit('updateAvatar', e.target.result);
  r.readAsDataURL(f);
}
socket.on('avatarUpdated', (b64) => { myUser.avatar = b64; updateProfileUI(); });

// UTILS
function resetInput() {
  document.getElementById('msgInput').value = '';
  fileData = null;
  replyTo = null;
  document.getElementById('replyBar').classList.remove('show');
}
function cancelReply() { replyTo = null; document.getElementById('replyBar').classList.remove('show'); }
function stringToColor(str) {
  let hash = 0; for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
  return '#' + "00000".substring(0, 6 - c.length) + c;
}

// SEARCH
function doSearch() {
  const q = document.getElementById('search').value;
  if(!q) return loadChats();
  if(currentTab === 'pm') socket.emit('searchUser', q);
  else socket.emit('searchPublicRooms', q);
}
socket.on('searchResults', (list) => renderList(list, 'pm'));
socket.on('roomSearchResults', (list) => renderList(list, 'room'));

</script>
</body>
</html>
